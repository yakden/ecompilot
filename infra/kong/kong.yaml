# ─────────────────────────────────────────────────────────────────────────────
# EcomPilot PL — Kong 3.6 Declarative Configuration
# Full gateway config: services, routes, plugins, consumers
# ─────────────────────────────────────────────────────────────────────────────

_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────────────────────────────────────────
# Global plugins (applied to every route unless overridden)
# ─────────────────────────────────────────────────────────────────────────────

plugins:
  - name: cors
    config:
      origins:
        - "https://ecompilot.com"
        - "https://app.ecompilot.com"
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Language
        - Authorization
        - Content-Type
        - X-Request-Id
        - X-User-ID
        - X-User-Plan
        - X-User-Language
      exposed_headers:
        - X-Request-Id
        - X-Plan-Limit
        - X-Plan-Used
        - X-Plan-Remaining
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
        - X-RateLimit-Limit-Hour
        - X-RateLimit-Remaining-Hour
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: request-id
    config:
      header_name: X-Request-Id
      generator: uuid#4
      echo_downstream: true

  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
      per_consumer: false

# ─────────────────────────────────────────────────────────────────────────────
# Services and Routes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────────────
  # auth-service  (port 3001)
  # Public endpoints — rate-limited only, no JWT required
  # ───────────────────────────────────────────────────────────────────────────
  - name: auth-service
    url: http://auth-service:3001
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    retries: 2
    tags: ["auth", "public"]
    routes:
      - name: auth-login-register
        paths:
          - /api/v1/auth
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        preserve_host: false
        tags: ["auth"]
      - name: auth-oauth
        paths:
          - /api/v1/oauth
        methods:
          - GET
          - POST
          - OPTIONS
        strip_path: false
        tags: ["auth", "oauth"]
      - name: auth-mfa
        paths:
          - /api/v1/mfa
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        tags: ["auth", "mfa"]
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          hour: 200
          policy: redis
          redis:
            host: redis
            port: 6379
            database: 0
          fault_tolerant: true
          hide_client_headers: false
          error_code: 429
          error_message: "Rate limit exceeded. Please slow down."
          sync_rate: -1

  # ───────────────────────────────────────────────────────────────────────────
  # analytics-service  (port 3002)
  # JWT required. Free plan: 5 requests/month
  # ───────────────────────────────────────────────────────────────────────────
  - name: analytics-service
    url: http://analytics-service:3002
    connect_timeout: 5000
    write_timeout: 30000
    read_timeout: 30000
    retries: 1
    tags: ["analytics", "protected"]
    routes:
      - name: analytics-routes
        paths:
          - /api/v1/analytics
        methods:
          - GET
          - POST
          - OPTIONS
        strip_path: false
        tags: ["analytics"]
    plugins:
      - name: jwt
        config:
          key_claim_name: kid
          claims_to_verify:
            - exp
          maximum_expiration: 86400
          run_on_preflight: false
          cookie_names: []
          uri_param_names: []
          header_names:
            - Authorization
      - name: request-transformer
        config:
          add:
            headers:
              - "X-User-ID:$(jwt.claims.sub)"
              - "X-User-Plan:$(jwt.claims.plan)"
              - "X-User-Language:$(jwt.claims.language)"
          remove:
            headers: []
      - name: ecompilot-plan-limiter
        config:
          limits:
            free:
              monthly: 5
            pro:
              monthly: -1
            business:
              monthly: -1
          redis_host: redis
          redis_port: 6379
          redis_prefix: "ecompilot:plan"

