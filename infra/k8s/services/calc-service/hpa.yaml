apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: calc-service
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: calc-service
    app.kubernetes.io/part-of: ecompilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: calc-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
        - type: Percent
          value: 10
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 50
          periodSeconds: 30
      selectPolicy: Max
