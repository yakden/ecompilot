# ─────────────────────────────────────────────────────────────────────────────
# Role — base read access for all services (ConfigMap, Secrets via projected)
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecompilot-service-base
  namespace: ecompilot
  labels:
    app.kubernetes.io/part-of: ecompilot
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]

# ─────────────────────────────────────────────────────────────────────────────
# Role — auth-service: can read/update its own secrets for token rotation
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-service-role
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: ecompilot
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["auth-service-config"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["auth-service-secret"]
    verbs: ["get"]

