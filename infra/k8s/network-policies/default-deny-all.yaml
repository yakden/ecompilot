---
# ─────────────────────────────────────────────────────────────────────────────
# Default Deny All — Zero-trust baseline
# All ingress and egress traffic is denied unless explicitly allowed by
# a subsequent NetworkPolicy in this directory.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: ecompilot
  labels:
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}  # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-egress
  namespace: ecompilot
  labels:
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# ─────────────────────────────────────────────────────────────────────────────
# Allow DNS resolution for all pods (required for service discovery)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ecompilot
  labels:
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # kube-dns / CoreDNS in kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ─────────────────────────────────────────────────────────────────────────────
# Allow Prometheus scraping from monitoring namespace
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: ecompilot
  labels:
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9464
          protocol: TCP
        - port: 9121
          protocol: TCP
        - port: 9187
          protocol: TCP
        - port: 7777
          protocol: TCP
