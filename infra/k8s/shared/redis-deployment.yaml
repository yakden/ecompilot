---
# ─────────────────────────────────────────────────────────────────────────────
# Redis 7 — Deployment with persistent storage
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: cache
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ecompilot
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    protected-mode yes
    tcp-backlog 511
    timeout 300
    tcp-keepalive 300

    # Authentication (password set via env variable at startup)
    requirepass ${REDIS_PASSWORD}

    # Memory management
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    maxmemory-samples 10

    # Persistence — AOF for durability
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    aof-use-rdb-preamble yes

    # RDB snapshots
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb

    # Slow log
    slowlog-log-slower-than 10000
    slowlog-max-len 128

    # Latency monitoring
    latency-monitor-threshold 100

    # Keyspace notifications (for pub/sub)
    notify-keyspace-events ""

    # Threads
    io-threads 2
    io-threads-do-reads yes

    # Logging
    loglevel notice
    logfile ""

    # Security
    rename-command FLUSHALL ""
    rename-command FLUSHDB ""
    rename-command DEBUG ""
    rename-command CONFIG "CONFIG_RESTRICTED_${RANDOM_SUFFIX}"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: cache
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: metrics
      port: 9121
      targetPort: 9121
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/component: cache
    app.kubernetes.io/version: "7"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: ecompilot
        app.kubernetes.io/component: cache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      serviceAccountName: redis
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - chown -R 999:999 /data && chmod 750 /data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
          volumeMounts:
            - name: redis-data
              mountPath: /data
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # Substitute password into config at runtime
              sed "s/\${REDIS_PASSWORD}/${REDIS_PASSWORD}/g; s/\${RANDOM_SUFFIX}/$(head -c 8 /dev/urandom | od -An -tx1 | tr -d ' \n')/g" \
                /etc/redis/redis.conf > /tmp/redis-runtime.conf
              exec redis-server /tmp/redis-runtime.conf
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config-vol
              mountPath: /etc/redis
            - name: tmp
              mountPath: /tmp
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: redis-config-vol
          configMap:
            name: redis-config
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: ecompilot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ecompilot
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi
