---
# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD ApplicationSet — All 16 EcomPilot services
# Generates one Application per service using the List generator.
# Auto-sync with prune + selfHeal enabled.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ecompilot-services
  namespace: argocd
  labels:
    app.kubernetes.io/name: ecompilot-services
    app.kubernetes.io/part-of: ecompilot
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/managed-by: argocd
spec:
  # ── Generators ─────────────────────────────────────────────────────────────
  generators:
    - list:
        elements:
          # Core API & Gateway
          - service: api-gateway
            port: "3000"
            replicas: "2"
            maxReplicas: "20"

          # Auth & Identity
          - service: auth-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          # Business Services
          - service: analytics-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: suppliers-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: calc-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: ai-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: billing-service
            port: "3000"
            replicas: "2"
            maxReplicas: "15"

          - service: content-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: legal-service
            port: "3000"
            replicas: "2"
            maxReplicas: "8"

          - service: academy-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: community-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: notification-service
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: marketplace-hub
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          - service: logistics-engine
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

          # Compliance & Finance
          - service: ksef-service
            port: "3000"
            replicas: "2"
            maxReplicas: "8"

          - service: payment-reconciliation
            port: "3000"
            replicas: "2"
            maxReplicas: "10"

  # ── Sync Policy — applies to all generated Applications ───────────────────
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: false

  # ── Application Template ───────────────────────────────────────────────────
  template:
    metadata:
      name: "ecompilot-{{service}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{service}}"
        app.kubernetes.io/part-of: ecompilot
        app.kubernetes.io/managed-by: argocd
      annotations:
        argocd.argoproj.io/manifest-generate-paths: "infra/k8s/services/{{service}}"
        notifications.argoproj.io/subscribe.on-deployed.slack: ecompilot-deployments
        notifications.argoproj.io/subscribe.on-sync-failed.slack: ecompilot-alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: ecompilot-alerts
    spec:
      project: ecompilot

      # ── Source ─────────────────────────────────────────────────────────────
      source:
        repoURL: https://github.com/ecompilot/ecompilot
        targetRevision: main
        path: "infra/k8s/overlays/production"
        kustomize:
          images:
            - "ghcr.io/ecompilot/{{service}}:latest"

      # ── Destination ────────────────────────────────────────────────────────
      destination:
        server: https://kubernetes.default.svc
        namespace: ecompilot

      # ── Sync Policy ────────────────────────────────────────────────────────
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=false
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      # ── Health Checks & Ignore Differences ────────────────────────────────
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas  # HPA manages replicas
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /spec/metrics  # Allow external metric additions

      revisionHistoryLimit: 3
---
# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD ApplicationSet — Shared Infrastructure (Postgres, Redis, NATS)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ecompilot-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/name: ecompilot-infrastructure
    app.kubernetes.io/part-of: ecompilot
spec:
  generators:
    - list:
        elements:
          - component: shared
          - component: ingress
          - component: network-policies

  syncPolicy:
    applicationsSync: create-update

  template:
    metadata:
      name: "ecompilot-{{component}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{component}}"
        app.kubernetes.io/part-of: ecompilot
      annotations:
        notifications.argoproj.io/subscribe.on-sync-failed.slack: ecompilot-alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: ecompilot-alerts
    spec:
      project: ecompilot

      source:
        repoURL: https://github.com/ecompilot/ecompilot
        targetRevision: main
        path: "infra/k8s/{{component}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: ecompilot

      syncPolicy:
        automated:
          prune: false   # Never auto-prune shared infrastructure
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m

      revisionHistoryLimit: 5
---
# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD AppProject — EcomPilot namespace-scoped project
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecompilot
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ecompilot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: EcomPilot SaaS Platform

  sourceRepos:
    - "https://github.com/ecompilot/ecompilot"
    - "https://charts.jetstack.io"         # cert-manager
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://argoproj.github.io/argo-helm"

  destinations:
    - namespace: ecompilot
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "cert-manager.io"
      kind: ClusterIssuer
    - group: "networking.k8s.io"
      kind: IngressClass
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "storage.k8s.io"
      kind: StorageClass

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: read-only
      description: Read-only access to all EcomPilot applications
      policies:
        - "p, proj:ecompilot:read-only, applications, get, ecompilot/*, allow"
      groups:
        - ecompilot-developers

    - name: deployer
      description: Deploy applications in EcomPilot project
      policies:
        - "p, proj:ecompilot:deployer, applications, *, ecompilot/*, allow"
        - "p, proj:ecompilot:deployer, repositories, *, *, allow"
      groups:
        - ecompilot-devops

  orphanedResources:
    warn: true
    ignore:
      - group: ""
        kind: ConfigMap
        name: "kube-root-ca.crt"

  syncWindows:
    - kind: deny
      schedule: "0 22 * * 1-5"  # Block deployments on weekday evenings
      duration: 8h
      applications:
        - "ecompilot-billing-service"
        - "ecompilot-payment-reconciliation"
        - "ecompilot-ksef-service"
      manualSync: true  # Allow manual override for emergencies
