# =============================================================================
# HashiCorp Vault Configuration for EcomPilot PL
#
# - Kubernetes auth method for pod-level identity
# - KV v2 secret engine
# - Automatic secret rotation schedules
# =============================================================================

# ---------------------------------------------------------------------------
# Secret Engine Configuration
# ---------------------------------------------------------------------------
secret_engines:
  - path: secret
    type: kv-v2
    description: "EcomPilot application secrets"
    options:
      max_versions: 10
      cas_required: false
      delete_version_after: "0s"  # never auto-delete; rely on max_versions

  - path: database
    type: database
    description: "Dynamic database credentials for EcomPilot services"

  - path: transit
    type: transit
    description: "Encryption-as-a-Service for PII field encryption"

# ---------------------------------------------------------------------------
# Kubernetes Auth Method
# ---------------------------------------------------------------------------
auth_methods:
  - type: kubernetes
    path: kubernetes
    config:
      # In-cluster config: Vault auto-discovers the K8s API
      kubernetes_host: "https://kubernetes.default.svc.cluster.local"
      # The Vault SA JWT is mounted automatically by the injector
      token_reviewer_jwt: ""  # uses pod service account
      kubernetes_ca_cert: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      issuer: "https://kubernetes.default.svc.cluster.local"
      disable_local_ca_jwt: false

# ---------------------------------------------------------------------------
# Kubernetes Auth Roles — one per service
# Each role binds a K8s service account to a Vault policy.
# ---------------------------------------------------------------------------
kubernetes_roles:
  - name: auth-service
    bound_service_account_names:
      - auth-service
    bound_service_account_namespaces:
      - ecompilot
    policies:
      - auth-service
    ttl: 1h
    max_ttl: 4h

  - name: billing-service
