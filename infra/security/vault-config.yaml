# ---------------------------------------------------------------------------
# Database Secret Engine — Dynamic Credentials
# ---------------------------------------------------------------------------
database_connections:
  - name: ecompilot-postgres
    plugin_name: postgresql-database-plugin
    connection_url: "postgresql://{{username}}:{{password}}@postgres.ecompilot.svc.cluster.local:5432/ecompilot?sslmode=require"
    allowed_roles:
      - "auth-db-role"
      - "billing-db-role"
      - "analytics-db-role"
      - "marketplace-db-role"
      - "community-db-role"
      - "content-db-role"
      - "ksef-db-role"
      - "legal-db-role"
      - "logistics-db-role"
      - "notification-db-role"
      - "payment-reconciliation-db-role"
      - "suppliers-db-role"
      - "academy-db-role"
      - "calc-db-role"
    # Root credentials are rotated on first mount
    username: "vault_admin"
    password: "REPLACE_VIA_VAULT_INIT"

# ---------------------------------------------------------------------------
# Secret Rotation Schedules
# ---------------------------------------------------------------------------
rotation_schedules:
  # Database passwords: rotate every 24 hours
  database_credentials:
    default_ttl: 24h
    max_ttl: 48h
    rotation_period: 24h
    revocation_statements:
      - "ALTER ROLE \"{{name}}\" NOLOGIN;"
      - "DROP ROLE IF EXISTS \"{{name}}\";"
    creation_statements:
      - |
        CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';
        GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO "{{name}}";
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO "{{name}}";

  # API keys (Stripe, OpenAI, marketplace tokens): rotate every 30 days
  api_keys:
    default_ttl: 720h   # 30 days
    max_ttl: 1440h       # 60 days
    rotation_period: 720h
    secrets:
      - secret/data/billing/stripe-api-key
      - secret/data/ai/openai-api-key
      - secret/data/ai/pinecone-api-key
      - secret/data/marketplace/allegro-api-key
      - secret/data/marketplace/amazon-api-key
      - secret/data/notification/sendgrid-api-key
      - secret/data/ksef/ksef-signing-key

  # JWT signing keys: rotate every 7 days (with 14-day overlap for validation)
  jwt_signing_keys:
    default_ttl: 168h   # 7 days
    max_ttl: 336h        # 14 days
    rotation_period: 168h
    overlap_period: 168h # old key remains valid for verification
    secrets:
      - secret/data/auth/jwt-signing-key
      - secret/data/auth/jwt-refresh-signing-key

  # Encryption keys (PII at rest): rotate every 90 days
  encryption_keys:
    default_ttl: 2160h  # 90 days
    max_ttl: 4320h       # 180 days
    rotation_period: 2160h
    # Re-encryption of existing data handled by migration job
    secrets:
      - secret/data/auth/pii-encryption-key
      - secret/data/marketplace/token-encryption-key
      - secret/data/billing/card-encryption-key

# ---------------------------------------------------------------------------
# Transit Engine — Named Encryption Keys
# ---------------------------------------------------------------------------
transit_keys:
  - name: pii-encryption
    type: aes256-gcm96
    deletion_allowed: false
    exportable: false
    allow_plaintext_backup: false
    min_decryption_version: 1
    min_encryption_version: 0  # always use latest

  - name: token-encryption
    type: aes256-gcm96
    deletion_allowed: false
    exportable: false
    allow_plaintext_backup: false
    min_decryption_version: 1
    min_encryption_version: 0

# ---------------------------------------------------------------------------
# Audit Configuration
# ---------------------------------------------------------------------------
audit_devices:
  - type: file
    path: audit-file
    options:
      file_path: /vault/audit/vault-audit.log
      log_raw: false
      hmac_accessor: true
      mode: "0600"
      format: json

  - type: syslog
    path: audit-syslog
    options:
      tag: vault
      facility: AUTH
      log_raw: false
