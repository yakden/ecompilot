name: ecompilot-prod

networks:
  ecompilot-network:
    external: true
  smpp-platform-net:
    external: true

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: ecompilot-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "4000:3000"
    networks:
      - ecompilot-network
      - smpp-platform-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  infra-ready:
    image: alpine:3.19
    container_name: ecompilot-infra-check
    command: ["sh", "-c", "echo 'Infrastructure ready' && sleep 5"]
    networks:
      - ecompilot-network
