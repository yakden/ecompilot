name: ecompilot-prod

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: ecompilot-web
    restart: unless-stopped
    env_file: .env
    network_mode: host
    environment:
      NODE_ENV: development
      PORT: "4000"
      HOSTNAME: "127.0.0.1"

  infra-ready:
    image: alpine:3.19
    container_name: ecompilot-infra-check
    command: ["sh", "-c", "echo 'Infrastructure ready' && sleep 5"]
