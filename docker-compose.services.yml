name: ecompilot-services

networks:
  ecompilot-network:
    external: true

services:
  auth-service:
    build:
      context: .
      dockerfile: infra/docker/dev.Dockerfile
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: "3001"
    container_name: ecompilot-auth
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
      SERVICE_NAME: auth-service
    ports:
      - "3001:3001"
    volumes:
      - ./services/auth-service/src:/app/services/auth-service/src
      - ./packages:/app/packages
    networks:
      - ecompilot-network
    depends_on:
      - infra-ready

