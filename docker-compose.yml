name: ecompilot

networks:
  ecompilot-network:
    driver: bridge
    name: ecompilot-network

volumes:
  postgres-data:
    name: ecompilot-postgres-data
  redis-data:
    name: ecompilot-redis-data
  nats-data:
    name: ecompilot-nats-data
  minio-data:
    name: ecompilot-minio-data
  clickhouse-data:
    name: ecompilot-clickhouse-data
  clickhouse-logs:
    name: ecompilot-clickhouse-logs
  elasticsearch-data:
    name: ecompilot-elasticsearch-data
  jaeger-data:
    name: ecompilot-jaeger-data
  prometheus-data:
    name: ecompilot-prometheus-data
  grafana-data:
    name: ecompilot-grafana-data

services:
  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecompilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecompilot
      POSTGRES_USER: ecompilot
      POSTGRES_PASSWORD: ecompilot_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecompilot -d ecompilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecompilot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ecompilot_redis_secret --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # NATS 2.10 with JetStream
  # ─────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: ecompilot-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ecompilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ecompilot_minio
      MINIO_ROOT_PASSWORD: ecompilot_minio_secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # ClickHouse 24 (analytics)
  # ─────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: ecompilot-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ecompilot_analytics
      CLICKHOUSE_USER: ecompilot
      CLICKHOUSE_PASSWORD: ecompilot_secret
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    networks:
      - ecompilot-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Elasticsearch 8.13 (search, single-node dev)
  # ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ecompilot-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=ecompilot-cluster
      - node.name=ecompilot-node-01
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────
  # Jaeger (distributed tracing)
  # ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ecompilot-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:14317:4317"
      - "127.0.0.1:14318:4318"
    volumes:
      - jaeger-data:/tmp
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # OpenTelemetry Collector
  # ─────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ecompilot-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    networks:
      - ecompilot-network
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # Prometheus
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ecompilot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - ecompilot-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ecompilot-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ecompilot_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - ecompilot-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
